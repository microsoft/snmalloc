name: snmalloc-rs CI

# The following should ensure that the workflow only runs a single set of actions
# for each PR. But it will not apply this to pushes to the main branch.
concurrency:
  group: ${{ github.ref }}-rust
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ${{ matrix.os }}
    name: "${{ matrix.os }}-${{ matrix.release.name }}-${{ matrix.rust }} (features: ${{ matrix.features.name }})"
    defaults:
      run:
        shell: bash
        working-directory:
          ./snmalloc-rs
    strategy:
      matrix:
        os: [windows-latest, macos-14, macos-15, ubuntu-latest]
        rust: [stable, nightly]
        release:
          - name: release
            flag: "--release"
          - name: debug
            flag: ""
        features:
          - name: default
            args: ""
          - name: debug
            args: "--features debug"
          - name: check
            args: "--features check"
          - name: build_cc
            args: '--features "build_cc usecxx17"'
          - name: native-cpu
            args: "--features native-cpu"
          - name: local_dynamic_tls
            args: "--features local_dynamic_tls"
          - name: lto
            args: "--features lto"
      # Don't abort runners if a single one fails
      fail-fast: false
    steps:
    - uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}
    - name: Checkout
      uses: actions/checkout@v4
    - name: update dependency
      run: |
        if bash -c 'uname -s | grep 'Linux' >/dev/null'; then
          sudo apt-get update -y && sudo apt-get --reinstall install -y libc6-dev
        fi
      shell: bash
    - name: Build
      run: cargo build ${{ matrix.release.flag }} --verbose ${{ matrix.features.args }}
    - name: Run tests
      run: cargo test ${{ matrix.release.flag }} --all ${{ matrix.features.args }}

  # ============================================================================
  # Heap-profiling feature build (Phase 7.5)
  #
  # Exercises the `profiling` cargo feature (which propagates
  # SNMALLOC_PROFILE=ON to the C++ build via snmalloc-sys) on every push.
  # Restricted to Linux + macOS because the profile code paths are validated
  # there in the C++ matrix; Windows profile coverage can be added later if
  # needed.
  # ============================================================================
  profiling:
    runs-on: ${{ matrix.os }}
    name: "profiling-${{ matrix.os }}-${{ matrix.release.name }}"
    defaults:
      run:
        shell: bash
        working-directory:
          ./snmalloc-rs
    strategy:
      matrix:
        os: [ubuntu-latest, macos-14, macos-15]
        rust: [stable]
        release:
          - name: release
            flag: "--release"
          - name: debug
            flag: ""
      fail-fast: false
    steps:
    - uses: actions-rs/toolchain@v1
      with:
        toolchain: ${{ matrix.rust }}
    - name: Checkout
      uses: actions/checkout@v4
    - name: update dependency
      run: |
        if bash -c 'uname -s | grep 'Linux' >/dev/null'; then
          sudo apt-get update -y && sudo apt-get --reinstall install -y libc6-dev
        fi
      shell: bash
    - name: Build (profiling)
      run: cargo build ${{ matrix.release.flag }} --verbose --features profiling
    - name: Run tests (profiling)
      run: cargo test ${{ matrix.release.flag }} --all --features profiling

  publish-scan:
    runs-on: ubuntu-latest
    name: publish-scan
    defaults:
      run:
        shell: bash
    steps:
    - uses: actions-rs/toolchain@v1
      with:
        toolchain: stable
    - name: Checkout
      uses: actions/checkout@v4
    - name: update dependency
      run: sudo apt-get update -y && sudo apt-get --reinstall install -y libc6-dev
    - name: Dry-run workspace publish
      run: cargo publish --workspace --exclude xtask --dry-run
